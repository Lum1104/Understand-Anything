name: Deploy Homepage

on:
  push:
    branches: [main]
    paths:
      - 'homepage/**'
      - 'understand-anything-plugin/packages/dashboard/**'
      - 'understand-anything-plugin/packages/core/**'
      - '.github/workflows/deploy-homepage.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to commit SHAs (not floating tags) so a
      # compromised tag can't run arbitrary code in the deploy pipeline.
      # Dependabot's github-actions ecosystem keeps these fresh.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build homepage
        working-directory: homepage
        run: pnpm build

      - name: Build core
        run: pnpm --filter @understand-anything/core build

      - name: Build demo dashboard
        run: pnpm --filter @understand-anything/dashboard build:demo
        env:
          VITE_GRAPH_URL: ${{ vars.DEMO_GRAPH_URL }}
          VITE_DOMAIN_GRAPH_URL: ${{ vars.DEMO_DOMAIN_GRAPH_URL }}
          VITE_META_URL: ${{ vars.DEMO_META_URL }}

      - name: Merge demo into homepage output
        run: cp -r understand-anything-plugin/packages/dashboard/dist homepage/dist/demo

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: homepage/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
